<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Pemakaian Lab - Sampoerna University</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="Sampoerna-University-koleksilogo.com_GKL14.png" alt="Logo Sampoerna University">
        </div>
        <h2>Formulir Pendaftaran Lab</h2>
        <form id="bookingForm">
            <label for="nama">Nama Lengkap:</label>
            <input type="text" id="nama" name="nama" required>
            <label for="idPengguna">NIM / ID Pengguna:</label>
            <input type="text" id="idPengguna" name="idPengguna" required>
            <label for="emailPengguna">Alamat Email:</label>
            <input type="email" id="emailPengguna" name="emailPengguna" required>
            <label for="tanggalBooking">Tanggal Booking:</label>
            <input type="date" id="tanggalBooking" name="tanggalBooking" required>
            <div class="time-container">
                <div>
                    <label for="waktuMulai">Waktu Mulai:</label>
                    <select id="waktuMulai" name="waktuMulai" required></select>
                </div>
                <div>
                    <label for="waktuSelesai">Waktu Selesai:</label>
                    <select id="waktuSelesai" name="waktuSelesai" required></select>
                </div>
            </div>
            <button type="submit" id="submitButton" disabled>Kirim Permintaan Booking</button>
        </form>
        <div id="statusMessage">Pilih tanggal untuk melihat jadwal yang tersedia.</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
